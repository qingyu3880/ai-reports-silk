<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 日报中心 - 音乐 | 电影 | 图书 | AI日报</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
        .tab-inactive { border-bottom: 3px solid transparent; color: #6b7280; }
        .tab-inactive:hover { color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app">
        <div class="flex items-center justify-center h-screen">
            <div class="text-gray-500">加载中...</div>
        </div>
    </div>
    
    <script>
        let reportsData = { daily: [], weekly: [], books: [], music: [], movies: [] };
        let currentTab = 'daily';

        async function loadData() {
            try {
                const response = await fetch('reports.json');
                reportsData = await response.json();
                render();
            } catch (e) {
                console.error('加载数据失败:', e);
                document.getElementById('app').innerHTML = `
                    <div class="flex items-center justify-center h-screen">
                        <div class="text-red-500">加载数据失败，请刷新页面重试</div>
                    </div>
                `;
            }
        }

        function render() {
            const app = document.getElementById('app');
            const total = reportsData.daily.length + reportsData.weekly.length + 
                         reportsData.books.length + reportsData.music.length + reportsData.movies.length;
            
            const tabs = [
                { id: 'daily', name: '📰 AI日报', count: reportsData.daily.length },
                { id: 'weekly', name: '✈️ 航空周报', count: reportsData.weekly.length },
                { id: 'books', name: '📚 图书推荐', count: reportsData.books.length },
                { id: 'music', name: '🎵 音乐推荐', count: reportsData.music.length },
                { id: 'movies', name: '🎬 电影推荐', count: reportsData.movies.length },
            ];
            
            const currentData = reportsData[currentTab] || [];
            
            app.innerHTML = `
                <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-lg">
                    <div class="max-w-7xl mx-auto px-4 py-12">
                        <h1 class="text-5xl font-bold mb-4">📊 AI 日报中心</h1>
                        <p class="text-blue-100 text-xl">汇聚全球AI动态，洞察技术趋势 | 音乐 · 电影 · 图书 · 日报</p>
                    </div>
                </header>

                <main class="max-w-7xl mx-auto px-4 py-10">
                    <!-- 统计卡片 -->
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-12">
                        <div class="bg-white rounded-2xl shadow-md p-6 border-l-4 border-blue-500">
                            <div class="text-3xl font-bold text-gray-800">${total}</div>
                            <div class="text-gray-500 mt-1 text-sm">总报告数</div>
                        </div>
                        <div class="bg-white rounded-2xl shadow-md p-6 border-l-4 border-green-500">
                            <div class="text-3xl font-bold text-gray-800">${reportsData.daily.length}</div>
                            <div class="text-gray-500 mt-1 text-sm">AI日报</div>
                        </div>
                        <div class="bg-white rounded-2xl shadow-md p-6 border-l-4 border-purple-500">
                            <div class="text-3xl font-bold text-gray-800">${reportsData.books.length}</div>
                            <div class="text-gray-500 mt-1 text-sm">图书推荐</div>
                        </div>
                        <div class="bg-white rounded-2xl shadow-md p-6 border-l-4 border-pink-500">
                            <div class="text-3xl font-bold text-gray-800">${reportsData.music.length}</div>
                            <div class="text-gray-500 mt-1 text-sm">音乐推荐</div>
                        </div>
                        <div class="bg-white rounded-2xl shadow-md p-6 border-l-4 border-orange-500">
                            <div class="text-3xl font-bold text-gray-800">${reportsData.movies.length}</div>
                            <div class="text-gray-500 mt-1 text-sm">电影推荐</div>
                        </div>
                    </div>

                    <!-- 标签页 -->
                    <div class="bg-white rounded-t-2xl shadow-md border-b border-gray-200">
                        <div class="flex overflow-x-auto">
                            ${tabs.map(tab => `
                                <button onclick="switchTab('${tab.id}')" 
                                    class="px-6 py-4 font-medium whitespace-nowrap transition-colors ${currentTab === tab.id ? 'tab-active' : 'tab-inactive'}">
                                    ${tab.name}
                                    <span class="ml-2 bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded-full">${tab.count}</span>
                                </button>
                            `).join('')}
                        </div>
                    </div>

                    <!-- 内容区域 -->
                    <div class="bg-white rounded-b-2xl shadow-md p-8 min-h-[400px]">
                        ${currentData.length === 0 ? `
                            <div class="text-center text-gray-400 py-20">
                                <div class="text-6xl mb-4">📭</div>
                                <div>暂无内容</div>
                            </div>
                        ` : `
                            <div class="space-y-6">
                                ${currentData.map(r => `
                                    <div class="border-b border-gray-100 pb-6 last:border-0 fade-in">
                                        <div class="flex items-center justify-between mb-3">
                                            <h3 class="text-xl font-semibold text-gray-800">${r.title}</h3>
                                            <span class="text-sm text-gray-400 bg-gray-100 px-3 py-1 rounded-full">${r.date}</span>
                                        </div>
                                        <p class="text-gray-600 leading-relaxed">${r.summary}</p>
                                        <button onclick="showDetail('${r.id}')" class="mt-3 text-blue-600 hover:text-blue-800 text-sm font-medium">
                                            查看详情 →
                                        </button>
                                    </div>
                                `).join('')}
                            </div>
                        `}
                    </div>
                </main>

                <!-- 详情弹窗 -->
                <div id="detailModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 overflow-y-auto">
                    <div class="min-h-screen px-4 text-center">
                        <div class="fixed inset-0 transition-opacity" onclick="closeModal()"></div>
                        <span class="inline-block h-screen align-middle" aria-hidden="true">&#8203;</span>
                        <div class="inline-block w-full max-w-4xl p-6 my-8 text-left align-middle transition-all transform bg-white shadow-xl rounded-2xl relative">
                            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
                            <div id="modalContent" class="prose max-w-none"></div>
                        </div>
                    </div>
                </div>
            `;
        }

        function switchTab(tab) {
            currentTab = tab;
            render();
        }

        function showDetail(id) {
            let item = null;
            for (const category of ['daily', 'weekly', 'books', 'music', 'movies']) {
                item = reportsData[category].find(r => r.id === id);
                if (item) break;
            }
            
            if (item && item.content) {
                document.getElementById('modalContent').innerHTML = `
                    <h1 class="text-3xl font-bold mb-4">${item.title}</h1>
                    <div class="text-gray-500 mb-6">${item.date} · ${item.category}</div>
                    <div class="prose max-w-none">${item.content.replace(/\n/g, '<br>')}</div>
                `;
                document.getElementById('detailModal').classList.remove('hidden');
            }
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        // 加载数据
        loadData();
    </script>
</body>
</html>
