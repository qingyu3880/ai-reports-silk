<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 日报中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app"></div>
    
    <script>
        const reportsData = {
            daily: [
                { id: 'ai-daily-2026-03-04', title: 'AI日报 | 2026年3月4日', date: '2026-03-04', category: 'AI', summary: 'OpenAI发布GPT-5.3，Claude登顶App Store后宕机' },
                { id: 'ai-daily-2026-03-03', title: 'AI日报 | 2026年3月3日', date: '2026-03-03', category: 'AI', summary: 'Anthropic完成300亿美元融资，字节豆包DAU破亿' },
            ],
            weekly: [
                { id: 'weekly-airline-2026-03-03', title: '航空公司AI转型周报', date: '2026-03-03', category: '航空', summary: '全球航空业AI应用案例' },
            ]
        };

        function render() {
            const app = document.getElementById('app');
            const total = reportsData.daily.length + reportsData.weekly.length;
            
            app.innerHTML = `
                <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-lg">
                    <div class="max-w-7xl mx-auto px-4 py-12">
                        <h1 class="text-5xl font-bold mb-4">📊 AI 日报中心</h1>
                        <p class="text-blue-100 text-xl">汇聚全球AI动态，洞察技术趋势</p>
                    </div>
                </header>

                <main class="max-w-7xl mx-auto px-4 py-10">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                        <div class="bg-white rounded-2xl shadow-md p-6 border-l-4 border-blue-500">
                            <div class="text-4xl font-bold text-gray-800">${total}</div>
                            <div class="text-gray-500 mt-1">总报告数</div>
                        </div>
                        <div class="bg-white rounded-2xl shadow-md p-6 border-l-4 border-green-500">
                            <div class="text-4xl font-bold text-gray-800">${reportsData.daily.length}</div>
                            <div class="text-gray-500 mt-1">AI日报</div>
                        </div>
                        <div class="bg-white rounded-2xl shadow-md p-6 border-l-4 border-purple-500">
                            <div class="text-4xl font-bold text-gray-800">${reportsData.weekly.length}</div>
                            <div class="text-gray-500 mt-1">周报</div>
                        </div>
                    </div>

                    <div class="bg-white rounded-2xl shadow-md p-8">
                        <h2 class="text-2xl font-bold text-gray-800 mb-6">📰 最新日报</h2>
                        <div class="space-y-4">
                            ${reportsData.daily.map(r => `
                                <div class="border-b border-gray-100 pb-4 last:border-0">
                                    <div class="flex items-center justify-between mb-2">
                                        <h3 class="text-lg font-semibold text-gray-800">${r.title}</h3>
                                        <span class="text-sm text-gray-400">${r.date}</span>
                                    </div>
                                    <p class="text-gray-600">${r.summary}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </main>
            `;
        }

        render();
    </script>
</body>
</html>
